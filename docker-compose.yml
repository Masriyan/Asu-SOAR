services:
  db:
    image: postgres:15-alpine
    container_name: asusoar-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asusoar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-asusoar_dev}
    ports:
      - "5432:5432"
    volumes:
      - asusoar_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asusoar}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - asusoar-net

  redis:
    image: redis:7-alpine
    container_name: asusoar-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - asusoar-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asusoar-backend
    environment: &backend-env
      - DATABASE_URL=postgresql://${POSTGRES_USER:-asusoar}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-asusoar_dev}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-me}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - asusoar-net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asusoar-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - asusoar-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asusoar-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - asusoar-net

volumes:
  asusoar_db_data:

networks:
  asusoar-net:
    driver: bridge
