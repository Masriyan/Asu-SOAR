<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F1A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00C2FF" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00C2FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1E2A3A" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="56" x2="900" y2="56"/>
    <line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accentLine)"/>

  <!-- Shield icon (left side) -->
  <g transform="translate(72, 140)">
    <!-- Shield outer -->
    <path d="M0,-68 L52,-44 L52,8 Q52,52 0,72 Q-52,52 -52,8 L-52,-44 Z"
          fill="none" stroke="#00C2FF" stroke-width="1.5" opacity="0.9"/>
    <!-- Shield inner glow fill -->
    <path d="M0,-68 L52,-44 L52,8 Q52,52 0,72 Q-52,52 -52,8 L-52,-44 Z"
          fill="#00C2FF" opacity="0.05"/>
    <!-- Shield check mark -->
    <path d="M-22,2 L-8,18 L24,-14"
          fill="none" stroke="#00C2FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot accent -->
    <circle cx="0" cy="-38" r="3" fill="#00C2FF" opacity="0.7"/>
    <!-- Corner brackets -->
    <path d="M-52,-44 L-52,-54 L-42,-54" fill="none" stroke="#00C2FF" stroke-width="1.5" opacity="0.5"/>
    <path d="M52,-44 L52,-54 L42,-54" fill="none" stroke="#00C2FF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Vertical separator line -->
  <line x1="168" y1="60" x2="168" y2="220" stroke="#00C2FF" stroke-width="0.75" opacity="0.3"/>

  <!-- Main title: ASUSOAR -->
  <text x="204" y="128" font-family="'Courier New', 'Lucida Console', monospace" font-size="64" font-weight="700"
        letter-spacing="6" fill="#FFFFFF">ASUSOAR</text>

  <!-- Subtitle underline accent -->
  <rect x="204" y="143" width="480" height="1.5" fill="#00C2FF" opacity="0.6"/>

  <!-- Subtitle text -->
  <text x="204" y="174" font-family="'Courier New', 'Lucida Console', monospace" font-size="15"
        font-weight="400" letter-spacing="4" fill="#00C2FF" opacity="0.9">SECURITY ORCHESTRATION · AUTOMATION · RESPONSE</text>

  <!-- Version badge -->
  <rect x="204" y="194" width="68" height="22" rx="3" fill="#00C2FF" opacity="0.15" stroke="#00C2FF" stroke-width="0.75"/>
  <text x="238" y="210" font-family="'Courier New', monospace" font-size="11" fill="#00C2FF"
        text-anchor="middle" font-weight="600" letter-spacing="1">v1.0.0</text>

  <!-- Platform badge -->
  <rect x="284" y="194" width="90" height="22" rx="3" fill="#00C2FF" opacity="0.08" stroke="#00C2FF" stroke-width="0.5" opacity="0.4"/>
  <text x="329" y="210" font-family="'Courier New', monospace" font-size="11" fill="#8899AA"
        text-anchor="middle" letter-spacing="1">ENTERPRISE</text>

  <!-- Right side circuit decoration -->
  <g opacity="0.25" stroke="#00C2FF" stroke-width="0.8" fill="none">
    <circle cx="780" cy="80" r="18"/>
    <circle cx="780" cy="80" r="8"/>
    <circle cx="780" cy="80" r="3" fill="#00C2FF"/>
    <line x1="798" y1="80" x2="840" y2="80"/>
    <line x1="762" y1="80" x2="720" y2="80"/>
    <line x1="780" y1="62" x2="780" y2="40"/>
    <line x1="780" y1="98" x2="780" y2="120"/>

    <circle cx="840" cy="80" r="4"/>
    <line x1="844" y1="80" x2="860" y2="80"/>
    <circle cx="860" cy="80" r="4"/>

    <circle cx="780" cy="200" r="18"/>
    <circle cx="780" cy="200" r="8"/>
    <circle cx="780" cy="200" r="3" fill="#00C2FF"/>
    <line x1="798" y1="200" x2="840" y2="200"/>
    <line x1="762" y1="200" x2="720" y2="200"/>
    <line x1="780" y1="182" x2="780" y2="160"/>
    <line x1="780" y1="218" x2="780" y2="240"/>

    <!-- Connecting vertical line between two circles -->
    <line x1="780" y1="120" x2="780" y2="160" stroke-dasharray="4,4"/>
  </g>

  <!-- Bottom right text -->
  <text x="870" y="262" font-family="'Courier New', monospace" font-size="10"
        fill="#334455" text-anchor="end" letter-spacing="2">GITHUB.COM/MASRIYAN/ASU-SOAR</text>

  <!-- Bottom accent line -->
  <rect x="0" y="277" width="900" height="3" fill="url(#accentLine)"/>
</svg>
